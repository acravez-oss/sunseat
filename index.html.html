<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SunSeat — Find Your Sunny Side</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1a1208;
    --paper: #faf6ee;
    --amber: #e8a020;
    --amber-light: #f5c96a;
    --amber-pale: #fdefc8;
    --rust: #c4531a;
    --sky: #4a8fc4;
    --sky-pale: #ddeeff;
    --shadow: rgba(26,18,8,0.12);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Mono', monospace;
    background: var(--paper);
    color: var(--ink);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Decorative sun background */
  body::before {
    content: '';
    position: fixed;
    top: -200px; right: -200px;
    width: 600px; height: 600px;
    background: radial-gradient(circle, rgba(232,160,32,0.18) 0%, rgba(245,201,106,0.08) 45%, transparent 70%);
    border-radius: 50%;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 760px;
    margin: 0 auto;
    padding: 48px 24px 80px;
  }

  header {
    margin-bottom: 52px;
    border-bottom: 2px solid var(--ink);
    padding-bottom: 24px;
  }

  .eyebrow {
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--amber);
    margin-bottom: 8px;
    font-weight: 500;
  }

  h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2.4rem, 6vw, 3.8rem);
    line-height: 1.05;
    font-weight: 700;
    letter-spacing: -0.02em;
  }

  h1 em {
    font-style: italic;
    color: var(--amber);
  }

  .subtitle {
    margin-top: 12px;
    font-size: 12px;
    letter-spacing: 0.05em;
    opacity: 0.6;
    line-height: 1.7;
  }

  /* Form */
  .form-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    margin-bottom: 20px;
  }

  .form-grid.three {
    grid-template-columns: 1fr 1fr 1fr;
  }

  @media (max-width: 560px) {
    .form-grid, .form-grid.three { grid-template-columns: 1fr; }
  }

  .field {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  label {
    font-size: 9px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    font-weight: 500;
    color: var(--ink);
    opacity: 0.7;
  }

  input, select {
    font-family: 'DM Mono', monospace;
    font-size: 14px;
    padding: 10px 14px;
    border: 1.5px solid rgba(26,18,8,0.25);
    background: white;
    color: var(--ink);
    border-radius: 4px;
    transition: border-color 0.15s, box-shadow 0.15s;
    appearance: none;
    -webkit-appearance: none;
  }

  input:focus, select:focus {
    outline: none;
    border-color: var(--amber);
    box-shadow: 0 0 0 3px rgba(232,160,32,0.15);
  }

  input::placeholder { opacity: 0.35; }

  .airport-hint {
    font-size: 10px;
    opacity: 0.45;
    margin-top: 2px;
  }

  button {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 14px 32px;
    background: var(--ink);
    color: var(--paper);
    border: none;
    border-radius: 4px;
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
    margin-top: 8px;
  }

  button:hover { background: #2e2010; }
  button:active { transform: scale(0.98); }

  /* Result */
  #result {
    margin-top: 40px;
    display: none;
    animation: fadeUp 0.4s ease;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .result-header {
    font-family: 'Playfair Display', serif;
    font-size: 1.1rem;
    font-weight: 400;
    font-style: italic;
    margin-bottom: 20px;
    opacity: 0.6;
    border-bottom: 1px solid rgba(26,18,8,0.15);
    padding-bottom: 12px;
  }

  .summary-card {
    background: var(--amber-pale);
    border: 1.5px solid var(--amber-light);
    border-radius: 6px;
    padding: 24px 28px;
    margin-bottom: 24px;
    display: flex;
    align-items: center;
    gap: 20px;
  }

  .sun-icon {
    font-size: 2.8rem;
    flex-shrink: 0;
    filter: drop-shadow(0 2px 6px rgba(232,160,32,0.4));
  }

  .summary-text h2 {
    font-family: 'Playfair Display', serif;
    font-size: 1.6rem;
    font-weight: 700;
    line-height: 1.2;
    margin-bottom: 4px;
  }

  .summary-text p {
    font-size: 12px;
    opacity: 0.65;
    line-height: 1.6;
  }

  /* Timeline */
  .timeline-label {
    font-size: 9px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    opacity: 0.5;
    margin-bottom: 10px;
    font-weight: 500;
  }

  .timeline {
    display: flex;
    gap: 0;
    border-radius: 4px;
    overflow: hidden;
    height: 36px;
    margin-bottom: 6px;
    border: 1.5px solid rgba(26,18,8,0.12);
  }

  .seg {
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 9px;
    font-weight: 500;
    letter-spacing: 0.06em;
    transition: opacity 0.2s;
    position: relative;
    overflow: hidden;
    cursor: default;
  }

  .seg.right  { background: var(--amber-light); color: var(--ink); }
  .seg.left   { background: var(--sky-pale);    color: var(--ink); }
  .seg.ahead  { background: #e8e4d8; color: var(--ink); opacity: 0.7; }
  .seg.behind { background: #e8e4d8; color: var(--ink); opacity: 0.7; }
  .seg.night  { background: #2a2840; color: #9eafc4; }

  .seg-label { pointer-events: none; white-space: nowrap; }

  .timeline-legend {
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
    margin-top: 8px;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 10px;
    opacity: 0.7;
  }

  .legend-dot {
    width: 10px; height: 10px;
    border-radius: 2px;
    flex-shrink: 0;
  }

  /* Segments table */
  .segments {
    margin-top: 28px;
  }

  .seg-row {
    display: grid;
    grid-template-columns: 80px 1fr 110px 100px;
    gap: 12px;
    padding: 10px 0;
    border-bottom: 1px solid rgba(26,18,8,0.07);
    font-size: 12px;
    align-items: center;
  }

  .seg-row.header {
    font-size: 9px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    opacity: 0.45;
    font-weight: 500;
    padding-bottom: 8px;
  }

  .side-badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 2px 8px;
    border-radius: 20px;
    font-size: 10px;
    font-weight: 500;
    white-space: nowrap;
  }

  .side-badge.right  { background: var(--amber-light); color: var(--ink); }
  .side-badge.left   { background: var(--sky-pale); color: var(--sky); }
  .side-badge.ahead  { background: #e8e4d8; color: var(--ink); }
  .side-badge.behind { background: #e8e4d8; color: var(--ink); }
  .side-badge.night  { background: #2a2840; color: #9eafc4; }

  .note {
    margin-top: 28px;
    padding: 16px 20px;
    border-left: 3px solid var(--amber);
    background: rgba(232,160,32,0.06);
    font-size: 11px;
    line-height: 1.7;
    opacity: 0.8;
  }

  .error-box {
    padding: 16px 20px;
    border: 1.5px solid var(--rust);
    border-radius: 4px;
    background: rgba(196,83,26,0.06);
    font-size: 12px;
    color: var(--rust);
    line-height: 1.6;
  }
</style>
</head>
<body>
<div class="container">

  <header>
    <div class="eyebrow">☀ Window Seat Planner</div>
    <h1>Find Your<br><em>Sunny Side</em></h1>
    <p class="subtitle">Enter your flight details to find out which side of the plane<br>the sun will be on — and pick the right window seat.</p>
  </header>

  <form id="flightForm" onsubmit="return false;">

    <div class="form-grid">
      <div class="field">
        <label>Origin Airport</label>
        <input id="origin" type="text" placeholder="e.g. JFK" maxlength="4" style="text-transform:uppercase">
        <div class="airport-hint">IATA code (3–4 letters)</div>
      </div>
      <div class="field">
        <label>Destination Airport</label>
        <input id="dest" type="text" placeholder="e.g. LAX" maxlength="4" style="text-transform:uppercase">
        <div class="airport-hint">IATA code (3–4 letters)</div>
      </div>
    </div>

    <div class="form-grid three">
      <div class="field">
        <label>Departure Date</label>
        <input id="depDate" type="date">
      </div>
      <div class="field">
        <label>Departure Time (local)</label>
        <input id="depTime" type="time" value="08:00">
      </div>
      <div class="field">
        <label>Flight Duration (hrs)</label>
        <input id="duration" type="number" min="0.5" max="20" step="0.5" placeholder="e.g. 5.5">
      </div>
    </div>

    <button type="button" onclick="calculate()">Calculate Sun Side →</button>
  </form>

  <div id="result"></div>

</div>

// ─── Solar position (accurate astronomical algorithm) ────────────────────────
function sunPosition(dateUTC, lat, lon) {
  // Julian date
  const JD = dateUTC / 86400000 + 2440587.5;
  const n = JD - 2451545.0;

  // Mean longitude, mean anomaly (degrees)
  const L = (280.46 + 0.9856474 * n) % 360;
  const g = ((357.528 + 0.9856003 * n) % 360) * Math.PI / 180;

  // Ecliptic longitude
  const lambdaDeg = L + 1.915 * Math.sin(g) + 0.020 * Math.sin(2 * g);
  const lambda = lambdaDeg * Math.PI / 180;

  // Obliquity of ecliptic
  const epsilon = (23.439 - 0.0000004 * n) * Math.PI / 180;

  // Right ascension, declination
  const sinDec = Math.sin(epsilon) * Math.sin(lambda);
  const dec = Math.asin(sinDec);

  // Greenwich Mean Sidereal Time (degrees)
  const GMST = (280.46061837 + 360.98564736629 * n) % 360;
  const RA_deg = Math.atan2(Math.cos(epsilon) * Math.sin(lambda), Math.cos(lambda)) * 180 / Math.PI;
  const HA = ((GMST + lon - RA_deg) % 360 + 360) % 360; // hour angle in degrees

  const latRad = lat * Math.PI / 180;
  const haRad = HA * Math.PI / 180;

  // Altitude
  const sinAlt = Math.sin(latRad) * Math.sin(dec) + Math.cos(latRad) * Math.cos(dec) * Math.cos(haRad);
  const alt = Math.asin(sinAlt) * 180 / Math.PI;

  // Azimuth (degrees from North, clockwise)
  const cosAz = (Math.sin(dec) - Math.sin(latRad) * sinAlt) / (Math.cos(latRad) * Math.cos(Math.asin(sinAlt)));
  let az = Math.acos(Math.max(-1, Math.min(1, cosAz))) * 180 / Math.PI;
  if (Math.sin(haRad) > 0) az = 360 - az;

  return { alt, az };
}

// ─── Great-circle interpolation ──────────────────────────────────────────────
function interpolate(lat1, lon1, lat2, lon2, t) {
  const toRad = d => d * Math.PI / 180;
  const toDeg = r => r * 180 / Math.PI;
  const φ1 = toRad(lat1), λ1 = toRad(lon1);
  const φ2 = toRad(lat2), λ2 = toRad(lon2);
  const d = 2 * Math.asin(Math.sqrt(
    Math.pow(Math.sin((φ2-φ1)/2),2) + Math.cos(φ1)*Math.cos(φ2)*Math.pow(Math.sin((λ2-λ1)/2),2)
  ));
  if (d < 1e-10) return {lat: lat1, lon: lon1};
  const A = Math.sin((1-t)*d)/Math.sin(d);
  const B = Math.sin(t*d)/Math.sin(d);
  const x = A*Math.cos(φ1)*Math.cos(λ1) + B*Math.cos(φ2)*Math.cos(λ2);
  const y = A*Math.cos(φ1)*Math.sin(λ1) + B*Math.cos(φ2)*Math.sin(λ2);
  const z = A*Math.sin(φ1) + B*Math.sin(φ2);
  return { lat: toDeg(Math.atan2(z, Math.sqrt(x*x+y*y))), lon: toDeg(Math.atan2(y, x)) };
}

// Bearing from (lat1,lon1) toward (lat2,lon2)
function bearing(lat1, lon1, lat2, lon2) {
  const toRad = d => d * Math.PI / 180;
  const φ1 = toRad(lat1), φ2 = toRad(lat2);
  const Δλ = toRad(lon2 - lon1);
  const y = Math.sin(Δλ) * Math.cos(φ2);
  const x = Math.cos(φ1)*Math.sin(φ2) - Math.sin(φ1)*Math.cos(φ2)*Math.cos(Δλ);
  return (Math.atan2(y, x) * 180 / Math.PI + 360) % 360;
}

// ─── Main calculation ────────────────────────────────────────────────────────
function calculate() {
  const originCode = document.getElementById('origin').value.trim().toUpperCase();
  const destCode = document.getElementById('dest').value.trim().toUpperCase();
  const depDate = document.getElementById('depDate').value;
  const depTime = document.getElementById('depTime').value;
  const durationHrs = parseFloat(document.getElementById('duration').value);

  const resultDiv = document.getElementById('result');

  // Validate
  const errors = [];
  if (!AIRPORTS[originCode]) errors.push(`Unknown origin airport: "${originCode}"`);
  if (!AIRPORTS[destCode]) errors.push(`Unknown destination airport: "${destCode}"`);
  if (!depDate) errors.push('Please enter a departure date.');
  if (!depTime) errors.push('Please enter a departure time.');
  if (isNaN(durationHrs) || durationHrs < 0.5) errors.push('Please enter a valid flight duration (minimum 0.5 hrs).');

  if (errors.length) {
    resultDiv.style.display = 'block';
    resultDiv.innerHTML = `<div class="error-box">${errors.map(e=>`⚠ ${e}`).join('<br>')}</div>`;
    return;
  }

  const orig = AIRPORTS[originCode];
  const dest = AIRPORTS[destCode];

  // Parse departure as local time, convert to UTC
  const [year, month, day] = depDate.split('-').map(Number);
  const [hour, min] = depTime.split(':').map(Number);
  const depLocalMs = Date.UTC(year, month-1, day, hour, min) - orig.tz * 3600000;
  const durationMs = durationHrs * 3600000;

  // Sample every 10 minutes
  const STEPS = Math.max(6, Math.round(durationHrs * 6));
  const segments = [];

  for (let i = 0; i <= STEPS; i++) {
    const t = i / STEPS;
    const msElapsed = t * durationMs;
    const utcMs = depLocalMs + msElapsed;
    const pos = interpolate(orig.lat, orig.lon, dest.lat, dest.lon, t);
    const sun = sunPosition(utcMs, pos.lat, pos.lon);
    // Plane heading: use bearing toward destination from this point (simplified)
    const hdg = bearing(pos.lat, pos.lon, dest.lat, dest.lon);
    // Relative sun angle
    let rel = ((sun.az - hdg) + 360) % 360;
    let side;
    if (sun.alt < -6) {
      side = 'night';
    } else if (rel >= 315 || rel < 45) {
      side = 'ahead';
    } else if (rel >= 45 && rel < 180) {
      side = 'right';
    } else if (rel >= 180 && rel < 315) {
      side = 'left';
    }
    segments.push({ t, msElapsed, utcMs, lat: pos.lat, lon: pos.lon, sunAlt: sun.alt, sunAz: sun.az, heading: hdg, rel, side });
  }

  // Tally
  const counts = { right:0, left:0, ahead:0, behind:0, night:0 };
  segments.forEach(s => counts[s.side]++);
  const total = segments.length;

  // Dominant side (ignoring night/ahead/behind if sun-facing sides exist)
  const sunSides = ['right','left'];
  let dominant = 'ahead';
  let maxPct = 0;
  sunSides.forEach(side => {
    const pct = counts[side] / total;
    if (pct > maxPct) { maxPct = pct; dominant = side; }
  });
  if (counts.night / total > 0.9) dominant = 'night';

  // Format time helper
  const fmtTime = (utcMs, tz) => {
    const localMs = utcMs + tz * 3600000;
    const d = new Date(localMs);
    return d.toISOString().substr(11, 5);
  };

  // Build timeline data (group consecutive same-side segments)
  const timelineSegs = [];
  let cur = null;
  segments.forEach(s => {
    if (!cur || cur.side !== s.side) {
      if (cur) timelineSegs.push(cur);
      cur = { side: s.side, count: 1, startT: s.t, startMs: s.utcMs };
    } else {
      cur.count++;
    }
  });
  if (cur) timelineSegs.push(cur);

  const sideLabel = { right:'☀ Right side', left:'☀ Left side', ahead:'Sun ahead', behind:'Sun behind', night:'🌙 Night' };
  const sideEmoji = { right:'🪟→', left:'←🪟', ahead:'🌅', behind:'🌇', night:'🌙' };

  // Summary message
  let summaryTitle, summaryDesc;
  if (dominant === 'night') {
    summaryTitle = 'Nighttime flight';
    summaryDesc = 'The flight is mostly in darkness — no sun on either side.';
  } else if (dominant === 'right') {
    const pct = Math.round(counts.right / total * 100);
    summaryTitle = `Sit on the RIGHT side`;
    summaryDesc = `The sun is on the right (starboard) side for about ${pct}% of the flight.`;
  } else if (dominant === 'left') {
    const pct = Math.round(counts.left / total * 100);
    summaryTitle = `Sit on the LEFT side`;
    summaryDesc = `The sun is on the left (port) side for about ${pct}% of the flight.`;
  } else {
    summaryTitle = 'Sun is ahead or behind';
    summaryDesc = 'The sun is mostly ahead of or behind the plane — either side has similar exposure.';
  }

  // Build segment detail rows (group into ~6 time blocks)
  const blockSize = Math.max(1, Math.floor(STEPS / 6));
  const detailRows = [];
  for (let i = 0; i < segments.length; i += blockSize) {
    const s = segments[i];
    const elapsedHrs = s.msElapsed / 3600000;
    const hh = Math.floor(elapsedHrs);
    const mm = Math.round((elapsedHrs - hh) * 60);
    const elapsed = `+${hh}h${mm.toString().padStart(2,'0')}m`;
    const localTime = fmtTime(s.utcMs, orig.tz);
    detailRows.push({ elapsed, localTime, sun: `${s.sunAlt.toFixed(0)}° alt`, side: s.side });
  }

  // Build HTML
  const timelineHTML = timelineSegs.map(seg => {
    const widthPct = seg.count / total * 100;
    const label = widthPct > 12 ? sideLabel[seg.side] : (widthPct > 6 ? seg.side : '');
    return `<div class="seg ${seg.side}" style="width:${widthPct}%"><span class="seg-label">${label}</span></div>`;
  }).join('');

  const detailHTML = detailRows.map(r => `
    <div class="seg-row">
      <div>${r.elapsed}</div>
      <div>${r.localTime} local</div>
      <div>${r.sun}</div>
      <div><span class="side-badge ${r.side}">${sideEmoji[r.side]} ${r.side}</span></div>
    </div>
  `).join('');

  resultDiv.style.display = 'block';
  resultDiv.innerHTML = `
    <div class="result-header">${orig.name} → ${dest.name}</div>

    <div class="summary-card">
      <div class="sun-icon">${dominant === 'night' ? '🌙' : dominant === 'right' ? '🪟→☀' : dominant === 'left' ? '☀←🪟' : '🌅'}</div>
      <div class="summary-text">
        <h2>${summaryTitle}</h2>
        <p>${summaryDesc}</p>
      </div>
    </div>

    <div class="timeline-label">Sun position along the flight path</div>
    <div class="timeline">${timelineHTML}</div>
    <div class="timeline-legend">
      <div class="legend-item"><div class="legend-dot" style="background:#f5c96a"></div> Sun on right</div>
      <div class="legend-item"><div class="legend-dot" style="background:#ddeeff"></div> Sun on left</div>
      <div class="legend-item"><div class="legend-dot" style="background:#e8e4d8"></div> Sun ahead/behind</div>
      <div class="legend-item"><div class="legend-dot" style="background:#2a2840"></div> Night</div>
    </div>

    <div class="segments">
      <div class="seg-row header">
        <div>Elapsed</div><div>Local time</div><div>Sun altitude</div><div>Side</div>
      </div>
      ${detailHTML}
    </div>

    <div class="note">
      ☀ <strong>Note:</strong> This uses great-circle routing (the shortest path). Actual routes vary due to airways, wind, and air traffic control, which can shift the sun's side by a segment or two. Results are most accurate for east–west and transatlantic flights.
    </div>
  `;
}
</script>
</body>
</html>
